<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cielo Gourmet- Comenta</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #FAF3E0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #8B0000;
        }
        .navbar-brand, .nav-link {
            color: #ffffff !important;
            font-weight: bold; /* Agregado para texto en negrita */
        }
        .navbar-brand:hover, .nav-link:hover {
            color: #FAF3E0 !important;
        }

        .hero {
            background-image: url('comenta.jpg');
            background-size: cover;
            background-position: center;
            height: 60vh;
            color: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: bold;
        }

        h2 {
            color: #8B0000;
        }
        
        .container p, label {
            color: #333;
        }

        .btn-primary {
            background-color: #FFD700;
            border: none;
            color: #8B0000;
        }
        .btn-primary:hover {
            background-color: #FFC107;
            color: #8B0000;
        }
        
        footer {
            background-color: #8B0000;
            color: #FAF3E0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="index.html">Cielo Gourmet</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="sedes.html">Sedes</a></li>
                <li class="nav-item"><a class="nav-link" href="comenta.html">Comenta</a></li>
                
            </ul>
        </div>
    </nav>

    <section class="hero">
        <div>
            <h1>Comentanos Como Fue Tu Experiencia</h1>
        </div>
    </section>

    <section class="container my-5">
        <h2>Cuéntanos tu experiencia</h2>
        <form>
            <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text" class="form-control" id="name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email">
            </div>
            <div class="form-group">
                <label for="comment">Comentario</label>
                <textarea class="form-control" id="comment" rows="4"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Enviar Comentario</button>
        </form>
    </section>

    <footer class="text-center p-4">
        <p>&copy; 2024 Cielo Gourmet. Todos los derechos reservados.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.6/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
